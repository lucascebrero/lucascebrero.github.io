<!DOCTYPE html>
<html lang="en">
		<head>
				<!-- Required meta tags -->
				<meta charset="utf-8">
				<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

				<!-- Bootstrap CSS -->
				<link rel="stylesheet" type="text/css" href="css/bootstrap.min.css">

				<!-- My CSS -->
				<link rel="stylesheet" type="text/css" href="css/main.css">

		</head>
		<body>
				<div class="navbar-brand fixed-top navbar-background"> 
						<a class="green-text" href="href">[ root@localhost ]$</a> 
						<a class="green-text blink" href="href">></a>
				</div> 
				<nav class="navbar navbar-expand-sm flex-row-reverse bg-transparent fixed-top navbar-background"> 
						<ul class="navbar-nav"> 
								<li class="nav-item nav"> 
										<a class="nav-link scroll-home" href="#">Home</a> 
								</li>
								<li class="nav-item">
										<a class="nav-link blog" href="#">Blog</a>
								</li>
				                <li class="nav-item">
										<a class="nav-link scroll-about" href="#">About</a>
								</li>
				                <li class="nav-item">
										<a class="nav-link scroll-work" href="#">Work Experience</a>
								</li>
				        </ul>
				</nav>
				<div class="home container-fluid">
						<div class="col-4 mx-auto text-center">
								<img class="img-circle mordo" src="css/mor.png">
						</div>	
						<div class="container-fluid white-text">
							<hr/>
							<p class="text-center">Self-Learner.Docker.Linux.Homelab</p>
							<hr/>
						</div>
				</div>
				<div class="about container-fluid">
						<h1>About</h1>
				</div>
				<div class="work-experience container-fluid">
						<h1>Work Experience</h1>
				</div>

				<!-- JQuery -->
				<script src="js/jquery-3.3.1.min.js"></script>

				<!-- Scroll scripts -->
				<script> 
						$(".scroll-about").click(function() { 
								$('html,body').animate({ 
										scrollTop: $(".about").offset().top}, 
										'slow'); 
						});
						$(".scroll-work").click(function() { 
								$('html,body').animate({ 
										scrollTop: $(".work-experience").offset().top}, 
										'slow'); 
						});

						$(".scroll-home").click(function() { 
								$('html,body').animate({ 
										scrollTop: $(".home").offset().top}, 
										'slow'); 
						}); 
						$(function(){
								$(document).scroll(function(){
										var $nav = $(".navbar-background");
										$nav.toggleClass('scrolled',$(this).scrollTop() > $nav.height());
								});
						});
						$(window).scroll(function(){ 
								if(parseInt($(window).scrollTop()) > parseInt("700")){ 
										$("nav").removeClass("bg-transparent"); 
										$(".navbar").css("background-color","white"); 
								}
								else {
										$("nav").addClass("bg-transparent");
								}

						});
				</script>		
		</body>
</html>
